<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSply — Lead Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">Dev<span>Sply</span></div>
    <div class="tagline">Automated Lead Generation Dashboard</div>
    <button id="refreshBtn" onclick="loadAll()">↻ Refresh</button>
  </header>

  <main>
    <!-- Stats row -->
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card" id="statTotal">
        <div class="stat-num">—</div>
        <div class="stat-label">Total Leads</div>
      </div>
      <div class="stat-card" id="statPages">
        <div class="stat-num">—</div>
        <div class="stat-label">Landing Pages</div>
      </div>
      <div class="stat-card" id="statSent">
        <div class="stat-num">—</div>
        <div class="stat-label">Emails Sent</div>
      </div>
      <div class="stat-card" id="statReplied">
        <div class="stat-num">—</div>
        <div class="stat-label">Replies</div>
      </div>
      <div class="stat-card" id="statConverted">
        <div class="stat-num">—</div>
        <div class="stat-label">Converted</div>
      </div>
      <div class="stat-card" id="statCities">
        <div class="stat-num">—</div>
        <div class="stat-label">Cities Done</div>
      </div>
    </section>

    <div class="panels">
      <!-- Pipeline runs -->
      <section class="panel">
        <h2>Pipeline Runs</h2>
        <div id="runsList" class="runs-list">Loading...</div>
      </section>

      <!-- Recent leads -->
      <section class="panel panel-wide">
        <h2>Recent Leads</h2>
        <div class="table-wrap">
          <table id="leadsTable">
            <thead>
              <tr>
                <th>Business</th>
                <th>Category</th>
                <th>City</th>
                <th>Phone</th>
                <th>Reviews</th>
                <th>Page</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="leadsBody">
              <tr><td colspan="7">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
